<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dialect Localization System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --accent:#7dd3fc;
            --accent-2:#a78bfa;
            --accent-3:#f472b6;
            --glass-fill:rgba(255,255,255,0.10);
            --glass-fill-soft:rgba(255,255,255,0.06);
            --glass-border:rgba(255,255,255,0.35);
            --glass-border-soft:rgba(255,255,255,0.16);
            --text-muted:rgba(255,255,255,0.65);
        }

        *{box-sizing:border-box;}

        html,body{
            margin:0;
            min-height:100vh;
            font-family:'Inter','Segoe UI',sans-serif;
            color:#fff;
        }


        body{
            background:
                radial-gradient(circle at 12% 18%, rgba(124,58,237,0.55), transparent 45%),
                radial-gradient(circle at 85% 15%, rgba(244,114,182,0.45), transparent 45%),
                radial-gradient(circle at 50% 90%, rgba(56,189,248,0.45), transparent 50%),
                linear-gradient(160deg,#0a0e27,#1a1040 60%,#0a0e27);
            background-attachment:fixed;
            position:relative;
            overflow-x:hidden;
        }

        /* floating ambient blobs for depth/motion behind the glass */
        .blob{
            position:fixed;
            border-radius:50%;
            filter:blur(10px);
            opacity:0.55;
            z-index:0;
            pointer-events:none;
        }
        .blob1{
            width:340px;height:340px;
            background:radial-gradient(circle, rgba(167,139,250,0.55), transparent 70%);
            top:-80px; left:-100px;
            animation:float1 14s ease-in-out infinite;
        }
        .blob2{
            width:300px;height:300px;
            background:radial-gradient(circle, rgba(125,211,252,0.5), transparent 70%);
            bottom:-90px; right:-80px;
            animation:float2 16s ease-in-out infinite;
        }
        .blob3{
            width:220px;height:220px;
            background:radial-gradient(circle, rgba(244,114,182,0.45), transparent 70%);
            top:40%; right:10%;
            animation:float3 12s ease-in-out infinite;
        }

        @keyframes float1{ 0%,100%{transform:translate(0,0);} 50%{transform:translate(40px,30px);} }
        @keyframes float2{ 0%,100%{transform:translate(0,0);} 50%{transform:translate(-30px,-40px);} }
        @keyframes float3{ 0%,100%{transform:translate(0,0);} 50%{transform:translate(-20px,25px);} }

        .page-wrap{
            position:relative;
            z-index:1;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            padding:40px 16px;
        }

        /* ===== liquid glass card ===== */
        .main-card{
            width:100%;
            max-width:720px;
            background:var(--glass-fill);
            backdrop-filter:blur(28px) saturate(180%);
            -webkit-backdrop-filter:blur(28px) saturate(180%);
            border:1px solid var(--glass-border);
            border-radius:28px;
            padding:38px 40px 32px;
            box-shadow:
                0 8px 32px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.4),
                inset 0 0 60px rgba(255,255,255,0.03);
            position:relative;
            overflow:hidden;
        }

        /* glossy top highlight sweep, like light hitting curved glass */
        .main-card::before{
            content:"";
            position:absolute;
            top:0; left:0; right:0;
            height:50%;
            background:linear-gradient(180deg, rgba(255,255,255,0.18), transparent);
            border-radius:28px 28px 0 0;
            pointer-events:none;
        }

        /* subtle edge refraction glow */
        .main-card::after{
            content:"";
            position:absolute;
            inset:0;
            border-radius:28px;
            background:linear-gradient(135deg, rgba(255,255,255,0.12), transparent 30%, transparent 70%, rgba(255,255,255,0.08));
            pointer-events:none;
        }

        .brand{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            margin-bottom:4px;
            position:relative;
            z-index:1;
        }

        .brand-icon{
            font-size:26px;
            line-height:1;
            filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));
        }

        .title{
            text-align:center;
            font-family:'Poppins', sans-serif;
            font-weight:700;
            font-size:27px;
            margin:0;
            background:linear-gradient(90deg,var(--accent),var(--accent-2),var(--accent-3));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }

        .subtitle{
            text-align:center;
            color:var(--text-muted);
            font-size:14px;
            margin-bottom:30px;
            position:relative;
            z-index:1;
        }

        form{position:relative; z-index:1;}

        label{
            font-size:12.5px;
            font-weight:600;
            color:rgba(255,255,255,0.85);
            text-transform:uppercase;
            letter-spacing:.05em;
            margin-bottom:8px;
            display:flex;
            align-items:center;
            gap:6px;
        }

        .field{margin-bottom:20px;}

        /* glass inputs */
        select, textarea{
            width:100%;
            background:var(--glass-fill-soft);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            color:#fff;
            border:1px solid var(--glass-border-soft);
            border-radius:14px;
            padding:13px 14px;
            font-size:15px;
            font-family:inherit;
            resize:none;
            transition:border-color .2s, box-shadow .2s, background .2s;
        }

        select option{
            background:#1a1040;
            color:#fff;
        }

        select:focus, textarea:focus{
            outline:none;
            border-color:rgba(255,255,255,0.55);
            background:rgba(255,255,255,0.12);
            box-shadow:0 0 0 3px rgba(167,139,250,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        textarea::placeholder{
            color:rgba(255,255,255,0.45);
        }

        /* glossy glass button */
        .btn-custom{
            width:100%;
            padding:14px;
            font-size:16px;
            font-weight:600;
            font-family:inherit;
            border:1px solid rgba(255,255,255,0.4);
            border-radius:14px;
            background:linear-gradient(135deg, rgba(167,139,250,0.55), rgba(125,211,252,0.45));
            backdrop-filter:blur(10px);
            -webkit-backdrop-filter:blur(10px);
            color:#fff;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            box-shadow:
                0 6px 20px rgba(124,58,237,0.35),
                inset 0 1px 0 rgba(255,255,255,0.5);
            transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
        }

        .btn-custom:hover{
            transform:translateY(-2px);
            filter:brightness(1.1);
            box-shadow:
                0 10px 26px rgba(124,58,237,0.45),
                inset 0 1px 0 rgba(255,255,255,0.6);
        }

        .btn-custom:active{transform:translateY(0);}

        .btn-custom:disabled{
            opacity:.7;
            cursor:not-allowed;
            transform:none;
        }

        .spinner{
            width:16px;
            height:16px;
            border:2px solid rgba(255,255,255,.45);
            border-top-color:#fff;
            border-radius:50%;
            animation:spin .7s linear infinite;
            display:none;
        }
        @keyframes spin{ to{transform:rotate(360deg);} }

        /* result panel — inner glass pane */
        .result-box{
            margin-top:26px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            border:1px solid var(--glass-border-soft);
            border-radius:18px;
            padding:20px 22px;
            position:relative;
            z-index:1;
            box-shadow:inset 0 1px 0 rgba(255,255,255,0.25);
            animation:fadeIn .45s ease;
        }

        @keyframes fadeIn{
            from{opacity:0; transform:translateY(10px);}
            to{opacity:1; transform:translateY(0);}
        }

        .result-box h4{
            font-size:14.5px;
            font-weight:600;
            margin:0;
            display:flex;
            align-items:center;
            gap:8px;
            color:#fff;
        }

        .result-box hr{
            border:none;
            border-top:1px solid var(--glass-border-soft);
            margin:14px 0;
        }

        #result{
            font-size:16px;
            line-height:1.65;
            color:rgba(255,255,255,0.95);
        }

        .btn-copy{
            background:rgba(255,255,255,0.1);
            border:1px solid var(--glass-border-soft);
            color:#fff;
            font-size:12.5px;
            font-weight:500;
            border-radius:10px;
            padding:6px 13px;
            cursor:pointer;
            transition:background .15s, border-color .15s;
        }

        .btn-copy:hover{
            background:rgba(255,255,255,0.2);
            border-color:rgba(255,255,255,0.4);
        }

        .footer{
            text-align:center;
            margin-top:22px;
            color:rgba(255,255,255,0.4);
            font-size:12.5px;
            position:relative;
            z-index:1;
        }

        @media (max-width:480px){
            .main-card{padding:28px 22px;}
            .title{font-size:22px;}
        }
    </style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="page-wrap">
  <div class="main-card">
    <div class="brand">
      <span class="brand-icon">🚀</span>
      <h1 class="title">AI Dialect Localization System</h1>
    </div>
    <p class="subtitle">Translate text into regional Tamil dialects using AI</p>

    <form method="POST" id="translateForm">
      <div class="field">
        <label>🌍 Select language</label>
        
          <select name="dialect">
      
      <option>Kongu Tamil</option>
     <option>Chennai Tamil</option>
     <option>Madurai Tamil</option>
     <option>Tirunelveli Tamil</option>
     <option>English</option>
</select>
      
       <option>Nagercoil Tamil</option>
</select> 
        </select>
      </div>

      <div class="field">
    <label>💬 Enter slang</label>

    <textarea
      rows="5"
      name="slang"
      id="slangInput"
      placeholder="Example: Bro exam was cooked 💀"></textarea>

    <br><br>

    <button type="button" id="voiceBtn" class="btn-copy">
        🎤 Voice Input
    </button>
    </div>
      <button class="btn-custom" type="submit" id="submitBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnLabel">✨ Translate</span>
      </button>
    </form>

    {% if result %}
    <div class="result-box">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h4>🤖 AI translation</h4>
        <button
          class="btn-copy"
          onclick="navigator.clipboard.writeText(document.getElementById('result').innerText)">
          📋 Copy
        </button>
      </div>
      <hr>
      <div id="result">
        {{ result }}
      </div>
    </div>
    {% endif %}

    <p class="footer">Powered by AI · Built for fast, casual translation</p>
  </div>
</div>

<script>
  document.getElementById('translateForm').addEventListener('submit', function () {
    document.getElementById('spinner').style.display = 'inline-block';
    document.getElementById('btnLabel').textContent = 'Translating...';
    document.getElementById('submitBtn').disabled = true;
  });

</script>
<script>
const voiceBtn = document.getElementById("voiceBtn");

voiceBtn.addEventListener("click", () => {

    alert("Voice button clicked!");

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Speech Recognition not supported");
        return;
    }

    const recognition = new SpeechRecognition();

    recognition.lang = "ta-IN";

    recognition.start();

    recognition.onresult = function(event) {
        document.getElementById("slangInput").value =
            event.results[0][0].transcript;
    };
});
</script>
<button type="button" id="voiceBtn" class="btn-copy">
    🎤 Voice Input
</button>
</body>
</html>
