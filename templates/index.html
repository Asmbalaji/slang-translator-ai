<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slang Translator AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            color:white;
            font-family:Segoe UI, sans-serif;
        }

        .main-card{
            max-width:900px;
            margin:50px auto;
            background:#1e293b;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.4);
        }

        .title{
            text-align:center;
            margin-bottom:25px;
            font-weight:bold;
        }

        textarea{
            background:#334155 !important;
            color:white !important;
            border:none !important;
            resize:none;
        }

        textarea::placeholder{
            color:#cbd5e1;
        }

        .btn-custom{
            width:100%;
            padding:12px;
            font-size:18px;
            font-weight:bold;
        }

        .result-box{
            margin-top:25px;
            background:#334155;
            padding:20px;
            border-radius:15px;
            border-left:5px solid #3b82f6;
        }

        .footer{
            text-align:center;
            margin-top:15px;
            color:#94a3b8;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="main-card">

        <h1 class="title">🚀 Slang Translator AI</h1>

        <form method="POST">

            <label class="mb-2">Select Language</label>

            <select class="form-select mb-3" name="language">
                <option value="Auto Detect">Auto Detect</option>
                <option value="Tamil">Tamil</option>
                <option value="Kongu Tamil">Kongu Tamil</option>
                <option value="Hindi">Hindi</option>
                <option value="Telugu">Telugu</option>
                <option value="Malayalam">Malayalam</option>
                <option value="English">English</option>
            </select>

            <label class="mb-2">Enter Text</label>

            <textarea
                class="form-control"
                rows="6"
                name="slang"
                placeholder="Example: Machan, nee semma gethu da!"
                required></textarea>

            <button class="btn btn-primary btn-custom mt-3">
                Translate
            </button>

        </form>

        {% if result %}
        <div class="result-box">
            <h4>✨ AI Translation</h4>
            <hr>

            <p style="white-space: pre-wrap;">
                {{ result }}
            </p>
        </div>
        {% endif %}

        <div class="footer">
            Powered by Groq + Llama 3.3
        </div>

    </div>

</div>

</body>
</html>
